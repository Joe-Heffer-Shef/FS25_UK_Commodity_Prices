name: Build

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate XML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate XML files are well-formed
        run: |
          find FS25_UK_Commodity_Prices -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout

  lint-lua:
    name: Lint Lua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y luarocks && sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck FS25_UK_Commodity_Prices/scripts

  test-lua:
    name: Test Lua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Lua and busted
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 liblua5.1-0-dev luarocks
          sudo luarocks install busted

      - name: Run busted test suite
        run: busted

  build:
    name: Build mod ZIP
    needs: [validate, lint-lua, test-lua]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Package mod
        run: cd FS25_UK_Commodity_Prices && zip -r ../FS25_UK_Commodity_Prices.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: FS25_UK_Commodity_Prices
          path: FS25_UK_Commodity_Prices.zip
          compression-level: 0
